<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>join form</title>
    
    <style>
        * {
            color: white;
            margin: 0%;
            padding: 0%;
            text-align: center;
        }

        #body::before {

            content: "";
            position: absolute;
            background: url(bg2.jpg) no-repeat center center/cover;
            height: 170%;
            top: 0px;
            left: 0px;
            width: 100%;
            z-index: -1;
        }
        

        #body {

            border-radius: 2px;
        }

        #form {
            border: 5px solid white;
            margin: 56px 95px;
            display: inline-block;
            padding: 20px;
            border-radius: 50px;

        }

        #title {
            margin: 4%;
            text-decoration: underline;
        }

        .heading {
            margin: 0%;
        }

        .input {
            width: 352px;
            margin: 17px;
            height: 24px;
            display: block;
            color: black;
            font-weight: bold;
        }

        .btn {
            margin-top: 12px;
            color: black;
            background: white;
            border-radius: 17px;
            padding: 5px 50px;
            width: 193px;
            font-size: 23px;
            height: 51px;
            cursor: pointer;
            font-weight: bold;
        }
        
         .btn :hover {
             background: brown
             ;
         }
       
    </style>
     <link rel="stylesheet" media="screen and (max-width: 624px)" href="form_phone.css">
</head>

<body>
    <div id="body">

        <form action="#" id="form">
            <h1 id="title">REGISTRATION FORM</h1>

            <h3 class="heading">First Name</h3>
            <input type="text" class="input" placeholder="ENTER YOUR FIRST NAME">
            <h3 class="heading">Last Name</h3>
            <input type="text" class="input" placeholder="ENTER YOUR LAST NAME">
            <h3 class="heading">Phone No.</h3>
            <input type="number" class="input" placeholder="ENTER YOUR PHONE">
            <h3 class="heading">Email Address</h3>
            <input type="email" class="input" placeholder="ENTER YOUR EMAIL">
            <h3 class="heading">Address</h3>
            <input type="text" class="input" placeholder="ENTER YOUR ADDRESS">
            <button class="btn">Submit</button>

        </form>

    </div>

</body>

</html>
